name: Build

on:
  workflow_call:
    inputs: 
      dotnet-version:
        required: false 
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Build
      working-directory: src
      run: |
        chmod +x $GITHUB_WORKSPACE/.github/workflows/scripts/build-nuget.cs
        $GITHUB_WORKSPACE/.github/workflows/scripts/build-nuget.cs $GITHUB_WORKSPACE/src/WB.Logging.csproj
